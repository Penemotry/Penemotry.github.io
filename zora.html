<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Zora — Your AI Voice Assistant</title>
    <style>
      @font-face {
        font-family: 'CameraPlainVariable';
        src: url('https://cdn.gpteng.co/mcp-widgets/v1/fonts/CameraPlainVariable.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0b0e;
        font-family: 'CameraPlainVariable', -apple-system, sans-serif;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .zora-page {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .status-text {
        position: absolute;
        top: 40px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        pointer-events: none;
        text-align: center;
      }

      .zora-orb-stage {
        position: relative;
        width: 350px;
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .zora-aura {
        position: absolute;
        width: 130%;
        height: 130%;
        background: radial-gradient(circle, rgba(87, 94, 207, 0.4) 0%, rgba(248, 88, 188, 0.1) 50%, transparent 70%);
        filter: blur(40px);
        transition: transform 0.08s ease, background 0.5s ease;
        pointer-events: none;
      }

      .zora-orb {
        position: relative;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #575ecf, #f858bc, #fe3f21);
        box-shadow: 0 0 60px rgba(87, 94, 207, 0.5), inset 0 0 40px rgba(255, 255, 255, 0.2);
        overflow: hidden;
        transition: transform 0.08s ease, box-shadow 0.3s ease, background 0.5s ease;
      }

      .listening-aura {
        background: radial-gradient(circle, rgba(248, 88, 188, 0.5) 0%, rgba(254, 123, 2, 0.15) 50%, transparent 70%);
      }

      .thinking-aura {
        background: radial-gradient(circle, rgba(254, 63, 33, 0.5) 0%, rgba(248, 88, 188, 0.15) 50%, transparent 70%);
      }

      .speaking-aura {
        background: radial-gradient(circle, rgba(0, 242, 254, 0.5) 0%, rgba(87, 94, 207, 0.15) 50%, transparent 70%);
      }

      .zora-orb.listening {
        background: radial-gradient(circle at 35% 35%, #f858bc, #fe7b02, #575ecf);
        box-shadow: 0 0 80px rgba(248, 88, 188, 0.8);
      }

      .zora-orb.thinking {
        background: radial-gradient(circle at 35% 35%, #fe3f21, #fe7b02, #f858bc);
        box-shadow: 0 0 80px rgba(254, 63, 33, 0.8);
        animation: rotateThinking 2s linear infinite;
      }

      .zora-orb.speaking {
        background: radial-gradient(circle at 35% 35%, #00f2fe, #575ecf, #f858bc);
        box-shadow: 0 0 80px rgba(0, 242, 254, 0.8);
      }

      @keyframes rotateThinking {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="zora-page" id="zoraContainer">
      <div class="status-text" id="statusLabel">TAP ANYWHERE TO TALK</div>
      
      <div class="zora-orb-stage">
        <div class="zora-aura" id="aura"></div>
        <div class="zora-orb" id="orb"></div>
      </div>
    </div>

    <script>
      // ==================== CONFIGURATION ====================
      const ELEVENLABS_API_KEY = "sk_56bef774e443527e3963d71250857139c12eab4f8f817c0b"; 
      const ELEVENLABS_VOICE_ID = "21m00Tcm4TlvDq8ikWAM"; // Standard Rachel Voice
      // =======================================================

      const container = document.getElementById('zoraContainer');
      const orb = document.getElementById('orb');
      const aura = document.getElementById('aura');
      const statusLabel = document.getElementById('statusLabel');

      let recognition = null;
      let audioContext = null;
      let analyser = null;
      let javascriptNode = null;
      let mediaStream = null;
      let activeAudioSource = null; 
      let currentState = "idle";

      container.addEventListener('click', (e) => {
        e.preventDefault();
        
        // Immediate hardware toggle interruption if tapped while processing/talking
        if (currentState === "listening" || currentState === "speaking" || currentState === "thinking") {
          completeAudioTeardown();
          resetToIdleState();
          return;
        }
        
        completeAudioTeardown();
        launchVoiceSession();
      });

      function launchVoiceSession() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          statusLabel.textContent = "SPEECH ERROR: CHROME REQUIRED";
          return;
        }

        currentState = "listening";
        statusLabel.textContent = "LISTENING";
        orb.className = "zora-orb listening";
        aura.className = "zora-aura listening-aura";

        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          attachMicrophoneVisualizer();
        };

        recognition.onresult = async (event) => {
          if (currentState !== "listening") return;
          const transcript = event.results[0][0].transcript;
          
          currentState = "thinking";
          statusLabel.textContent = "THINKING";
          orb.className = "zora-orb thinking";
          aura.className = "zora-aura thinking-aura";
          
          // Instantly teardown mic loop to clear hardware for input-output switching
          detachMicrophoneTracks();

          try {
            const aiText = await queryDuckDuckGoAI(transcript);
            await streamElevenLabsSpeech(aiText);
          } catch (err) {
            console.error(err);
            resetToIdleState();
          }
        };

        recognition.onerror = () => { resetToIdleState(); };
        recognition.onend = () => { if (currentState === "listening") resetToIdleState(); };

        try {
          recognition.start();
        } catch (e) {
          resetToIdleState();
        }
      }

      async function attachMicrophoneVisualizer() {
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 32;
          
          const source = audioContext.createMediaStreamSource(mediaStream);
          source.connect(analyser);
          
          javascriptNode = audioContext.createScriptProcessor(256, 1, 1);
          analyser.connect(javascriptNode);
          javascriptNode.connect(audioContext.destination);
          
          javascriptNode.onaudioprocess = () => {
            if (currentState !== "listening") return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) { sum += dataArray[i]; }
            const volume = sum / dataArray.length;
            
            const currentScale = 1 + (volume / 70);
            orb.style.transform = `scale(${currentScale})`;
            aura.style.transform = `scale(${currentScale * 1.15})`;
          };
        } catch (err) {
          console.warn("Local audio pipeline permission blocked", err);
        }
      }

      // Live Real Generative AI over DuckDuckGo Edge Router
      async function queryDuckDuckGoAI(prompt) {
        try {
          const initRes = await fetch("https://duckduckgo.com/duckchat/v1/status", {
            headers: { "x-vqd-accept": "1" }
          });
          const vqdToken = initRes.headers.get("x-vqd-4");

          const response = await fetch("https://duckduckgo.com/duckchat/v1/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-vqd-4": vqdToken
            },
            body: JSON.stringify({
              model: "meta-llama/Llama-3.3-70B-Instruct-Turbo",
              messages: [{
                role: "user",
                content: `You are Zora, an advanced AI. Respond conversationally and naturally in 2 short sentences. Do not use any markdown tags, bolding, or lists. User query: ${prompt}`
              }]
            })
          });

          const rawText = await response.text();
          const lines = rawText.split("\n");
          let finalAnswer = "";
          
          for (let line of lines) {
            if (line.startsWith("data: ")) {
              const cleanData = line.replace("data: ", "").trim();
              if (cleanData === "[DONE]") break;
              try {
                const parsed = JSON.parse(cleanData);
                if (parsed.message) finalAnswer += parsed.message;
              } catch(e){}
            }
          }
          return finalAnswer || "Connection array anomaly. Please speak parameters again.";
        } catch (err) {
          return "Matrix connection timed out. Let us try that again.";
        }
      }

      // Audio frequency wave analyzer mapping to ElevenLabs Streams
      async function streamElevenLabsSpeech(textText) {
        currentState = "speaking";
        statusLabel.textContent = "SPEAKING";
        orb.className = "zora-orb speaking";
        aura.className = "zora-aura speaking-aura";

        const url = `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`;
        
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'xi-api-key': ELEVENLABS_API_KEY
          },
          body: JSON.stringify({
            text: textText,
            model_id: "eleven_monolingual_v1",
            voice_settings: { stability: 0.5, similarity_boost: 0.75 }
          })
        });

        if (!response.ok) throw new Error("ElevenLabs engine reject.");

        const audioBlob = await response.blob();
        const arrayBuffer = await audioBlob.arrayBuffer();

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;

        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        activeAudioSource = audioContext.createBufferSource();
        activeAudioSource.buffer = audioBuffer;

        activeAudioSource.connect(analyser);
        analyser.connect(audioContext.destination);

        javascriptNode = audioContext.createScriptProcessor(256, 1, 1);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        // Map live ElevenLabs vocal vibrations cleanly to the orb scale matrix
        javascriptNode.onaudioprocess = () => {
          if (currentState !== "speaking") return;
          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(dataArray);
          
          let sum = 0;
          for(let i=0; i<dataArray.length; i++) { sum += dataArray[i]; }
          const speechVolume = sum / dataArray.length;
          
          const voiceScale = 1 + (speechVolume / 65);
          orb.style.transform = `scale(${voiceScale})`;
          aura.style.transform = `scale(${voiceScale * 1.15})`;
        };

        activeAudioSource.onended = () => {
          if (currentState === "speaking") resetToIdleState();
        };

        activeAudioSource.start(0);
      }

      function detachMicrophoneTracks() {
        try {
          if (javascriptNode) { javascriptNode.disconnect(); javascriptNode.onaudioprocess = null; }
          if (analyser) analyser.disconnect();
          if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        } catch(e) {}
      }

      function completeAudioTeardown() {
        detachMicrophoneTracks();
        try {
          if (activeAudioSource) { activeAudioSource.stop(); activeAudioSource.disconnect(); activeAudioSource = null; }
          if (audioContext) { audioContext.close(); audioContext = null; }
        } catch(e) {}
        
        if (recognition) {
          try { recognition.abort(); } catch(e){}
          recognition = null;
        }
        orb.style.transform = "";
        aura.style.transform = "";
      }

      function resetToIdleState() {
        currentState = "idle";
        statusLabel.textContent = "TAP ANYWHERE TO TALK";
        orb.className = "zora-orb";
        aura.className = "zora-aura";
      }
    </script>
  </body>
</html>
