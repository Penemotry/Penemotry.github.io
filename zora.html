<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zora — Your AI Voice Assistant</title>
    <style>
      @font-face {
        font-family: 'CameraPlainVariable';
        src: url('https://cdn.gpteng.co/mcp-widgets/v1/fonts/CameraPlainVariable.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0b0e;
        font-family: 'CameraPlainVariable', -apple-system, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      .zora-page {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .status-text {
        position: absolute;
        top: 40px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 15px;
        letter-spacing: 2px;
        text-transform: uppercase;
        pointer-events: none;
      }

      .subtitle-text {
        position: absolute;
        bottom: 80px;
        color: #ffffff;
        font-size: 22px;
        text-align: center;
        max-width: 75%;
        min-height: 30px;
        pointer-events: none;
        line-height: 1.5;
        font-weight: 300;
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      }

      .zora-orb-stage {
        position: relative;
        width: 350px;
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .zora-aura {
        position: absolute;
        width: 130%;
        height: 130%;
        background: radial-gradient(circle, rgba(87, 94, 207, 0.4) 0%, rgba(248, 88, 188, 0.1) 50%, transparent 70%);
        filter: blur(40px);
        transition: transform 0.08s ease;
        pointer-events: none;
      }

      .zora-orb {
        position: relative;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #575ecf, #f858bc, #fe3f21);
        box-shadow: 0 0 60px rgba(87, 94, 207, 0.5), inset 0 0 40px rgba(255, 255, 255, 0.2);
        overflow: hidden;
        transition: transform 0.08s ease, box-shadow 0.3s ease, background 0.5s ease;
      }

      .listening-aura {
        background: radial-gradient(circle, rgba(248, 88, 188, 0.5) 0%, rgba(254, 123, 2, 0.15) 50%, transparent 70%);
      }

      .speaking-aura {
        background: radial-gradient(circle, rgba(0, 242, 254, 0.5) 0%, rgba(87, 94, 207, 0.15) 50%, transparent 70%);
      }

      .zora-orb.listening {
        background: radial-gradient(circle at 35% 35%, #f858bc, #fe7b02, #575ecf);
        box-shadow: 0 0 80px rgba(248, 88, 188, 0.8);
      }

      .zora-orb.speaking {
        background: radial-gradient(circle at 35% 35%, #00f2fe, #575ecf, #f858bc);
        box-shadow: 0 0 80px rgba(0, 242, 254, 0.8);
      }

      .zora-ring {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        pointer-events: none;
        transition: transform 0.1s ease;
      }

      .zora-ring-1 { width: 260px; height: 260px; border-color: rgba(87, 94, 207, 0.15); }
      .zora-ring-2 { width: 300px; height: 300px; border-color: rgba(248, 88, 188, 0.1); }
    </style>
  </head>
  <body>
    <div class="zora-page" id="zoraContainer">
      <div class="status-text" id="statusLabel">TAP ANYWHERE TO WAKE ZORA</div>
      <div class="subtitle-text" id="subtitles">Ready when you are.</div>
      
      <div class="zora-orb-stage">
        <div class="zora-aura" id="aura"></div>
        <div class="zora-ring zora-ring-1" id="ring1"></div>
        <div class="zora-ring zora-ring-2" id="ring2"></div>
        <div class="zora-orb" id="orb"></div>
      </div>
    </div>

    <script>
      const container = document.getElementById('zoraContainer');
      const orb = document.getElementById('orb');
      const aura = document.getElementById('aura');
      const ring1 = document.getElementById('ring1');
      const ring2 = document.getElementById('ring2');
      const statusLabel = document.getElementById('statusLabel');
      const subtitles = document.getElementById('subtitles');

      let recognition = null;
      let audioContext = null;
      let analyser = null;
      let javascriptNode = null;
      let mediaStream = null;
      let currentState = "idle";

      // Self-cleaning setup prevents speech freeze crashes on multiple clicks
      container.addEventListener('click', () => {
        if (window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }

        if (currentState === "listening") {
          killAudioSystem();
          resetToIdle("TAP TO TALK");
        } else {
          killAudioSystem(); 
          bootSpeechEngine();
        }
      });

      function bootSpeechEngine() {
        currentState = "listening";
        statusLabel.textContent = "LISTENING NOW";
        subtitles.textContent = "Say something to Zora...";
        orb.className = "zora-orb listening";
        aura.className = "zora-aura listening-aura";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          subtitles.textContent = "Speech recognition unsupported on this web runtime.";
          return;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          bindMicrophoneMatrix();
        };

        recognition.onresult = (event) => {
          if (currentState !== "listening") return;
          const transcript = event.results[0][0].transcript;
          
          subtitles.textContent = `"${transcript}"`;
          statusLabel.textContent = "GENERATING RESPONSE";
          currentState = "thinking";
          
          killAudioSystem();
          
          setTimeout(() => {
            if (currentState === "thinking") {
              const creativeResponse = buildGenerativeText(transcript);
              fireTextToSpeech(creativeResponse);
            }
          }, 700);
        };

        recognition.onerror = () => {
          if (currentState === "listening") {
            resetToIdle("TAP TO RESTART");
            subtitles.textContent = "System timed out. Tap and speak again.";
          }
        };

        recognition.onend = () => {
          if (currentState === "listening") resetToIdle("TAP TO TALK");
        };

        recognition.start();
      }

      async function bindMicrophoneMatrix() {
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 32;
          
          const source = audioContext.createMediaStreamSource(mediaStream);
          source.connect(analyser);
          
          javascriptNode = audioContext.createScriptProcessor(256, 1, 1);
          analyser.connect(javascriptNode);
          javascriptNode.connect(audioContext.destination);
          
          javascriptNode.onaudioprocess = () => {
            if (currentState !== "listening") return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) { sum += dataArray[i]; }
            const micVolume = sum / dataArray.length;
            
            // Immediate real-time fluid scaling metrics
            const currentScale = 1 + (micVolume / 75);
            orb.style.transform = `scale(${currentScale})`;
            aura.style.transform = `scale(${currentScale * 1.15})`;
            ring1.style.transform = `scale(${1 + (micVolume / 140)})`;
            ring2.style.transform = `scale(${1 + (micVolume / 180)})`;
          };
        } catch (err) {
          console.warn("Microphone feedback loop denied:", err);
        }
      }

      // Procedural Generative Text Model
      function buildGenerativeText(input) {
        const text = input.toLowerCase();

        const dictionary = {
          starts: ["Synthesizing new data streams. ", "Opening structural pathways. ", "Processing system arrays. ", "Ah, analyzing that conceptual matrix. "],
          nodes: ["The logic variables suggest that custom web applications ", "Building dynamic visual designs with fluid assets ", "Integrating clean client architecture patterns ", "Running complete server-side simulations "],
          conclusions: ["allows systems to scale efficiently.", "generates optimal operational benchmarks.", "creates an engaging environment infrastructure.", "keeps variables cleanly separated."]
        };

        if (text.includes("hello") || text.includes("hi")) {
          return "Connection secure. I am Zora, your operational voice interface. State your parameters and let's begin.";
        }
        if (text.includes("weather")) {
          return "Atmospheric diagnostic complete. Local weather arrays show standard clarity indices with balanced temperature frames.";
        }
        if (text.includes("name")) {
          return "My identity tag is Zora. A fully functional generative assistant compiled within a unified single file script.";
        }

        // Build unique procedural responses
        const randomElement = (arr) => arr[Math.floor(Math.random() * arr.length)];
        return randomElement(dictionary.starts) + randomElement(dictionary.nodes) + randomElement(dictionary.conclusions);
      }

      function fireTextToSpeech(outputPhrase) {
        currentState = "speaking";
        statusLabel.textContent = "ZORA VOICE ACTIVE";
        subtitles.textContent = outputPhrase;
        orb.className = "zora-orb speaking";
        aura.className = "zora-aura speaking-aura";

        const speakInstance = new SpeechSynthesisUtterance(outputPhrase);
        
        // Find standard English voice engine profile
        const activeVoices = window.speechSynthesis.getVoices();
        const preferredVoice = activeVoices.find(v => v.lang.includes("en-US") || v.lang.startsWith("en"));
        if (preferredVoice) speakInstance.voice = preferredVoice;

        speakInstance.rate = 1.0;
        speakInstance.pitch = 1.0;

        // Interactive frequency bouncing emulation while voice speaks out loud
        let waveDirection = 1;
        let waveScale = 1;
        const voiceFrequencyPulse = setInterval(() => {
          if (!window.speechSynthesis.speaking || currentState !== "speaking") {
            clearInterval(voiceFrequencyPulse);
            return;
          }
          waveScale += 0.015 * waveDirection;
          if (waveScale > 1.06 || waveScale < 0.97) waveDirection *= -1;
          
          orb.style.transform = `scale(${waveScale})`;
          aura.style.transform = `scale(${waveScale * 1.1})`;
        }, 100);

        speakInstance.onend = () => {
          clearInterval(voiceFrequencyPulse);
          if (currentState === "speaking") resetToIdle("TAP TO TALK");
        };

        speakInstance.onerror = () => {
          clearInterval(voiceFrequencyPulse);
          if (currentState === "speaking") resetToIdle("TAP TO TALK");
        };

        window.speechSynthesis.speak(speakInstance);
      }

      function killAudioSystem() {
        try {
          if (javascriptNode) { javascriptNode.disconnect(); javascriptNode = null; }
          if (analyser) { analyser.disconnect(); analyser = null; }
          if (audioContext) { audioContext.close(); audioContext = null; }
          if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
        } catch(e) {}
        
        if (recognition) {
          try { recognition.abort(); } catch(e){}
          recognition = null;
        }
        orb.style.transform = "";
        aura.style.transform = "";
        ring1.style.transform = "";
        ring2.style.transform = "";
      }

      function resetToIdle(msg) {
        currentState = "idle";
        statusLabel.textContent = msg;
        orb.className = "zora-orb";
        aura.className = "zora-aura";
      }
    </script>
  </body>
</html>
